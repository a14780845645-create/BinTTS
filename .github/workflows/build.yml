name: Build BinTTS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13  # 固定用 macOS 13 稳定版，避免环境问题
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # 用 v3 稳定版，避免 Node.js 弃用警告
        with:
          submodules: recursive

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          brew install dpkg ldid

      - name: Build Tweak
        run: |
          # 进入项目根目录
          cd $GITHUB_WORKSPACE
          make clean
          make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: BinTTS_Output
          path: |
            packages/*.deb
            .theos/obj/debug/BinTTS.dylib
            BinTTS.plist
